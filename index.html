<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <title>Forms</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <style>
      ::placeholder {
        color: grey;
      }
    </style>
  </head>

  <body class="bg-dark">
    <header></header>
    <main class="container pt-4">
      <section class="row justify-content-center">
        <article class="col-md-6">
          <h1 class="text-primary my-3 text-center">Form essere umani</h1>
          <form id="form-umani">
            <div class="d-flex flex-column align-items-center my-2">
              <label for="firstName" class="form-label text-white">Nome</label>
              <input
                type="text"
                class="d-block w-100 rounded-2 border border-1 border-white bg-secondary text-white"
                id="firstName"
                placeholder="Giangiorgio"
                required
              />
            </div>
            <div class="d-flex flex-column align-items-center my-2">
              <label for="lastName" class="form-label text-white"
                >Congnome</label
              >
              <input
                type="text"
                class="d-block w-100 rounded-2 border border-1 border-white bg-secondary text-white"
                id="lastName"
                placeholder="Verdi"
                required
              />
            </div>
            <div class="d-flex flex-column align-items-center my-2">
              <label for="age" class="form-label text-white">Età</label>
              <input
                type="text"
                class="d-block w-100 rounded-2 border border-1 border-white bg-secondary text-white"
                id="age"
                placeholder="42"
                required
              />
            </div>
            <div class="d-flex flex-column align-items-center my-2">
              <label for="Location" class="form-label text-white"
                >Località</label
              >
              <input
                type="text"
                class="d-block w-100 rounded-2 border border-1 border-white bg-secondary text-white"
                id="location"
                placeholder="Roma"
                required
              />
            </div>
            <div class="text-center mt-3">
              <button class="btn btn-success w-50" type="submit">INVIA</button>
            </div>
          </form>
        </article>
      </section>
      <section class="row justify-content-center">
        <article class="col-md-6">
          <h1 class="text-primary my-3 text-center">Form animali</h1>
          <form id="form-pet">
            <div class="d-flex flex-column align-items-center my-2">
              <label for="petName" class="form-label text-white"
                >Nome animale</label
              >
              <input
                type="text"
                class="d-block w-100 rounded-2 border border-1 border-white bg-secondary text-white"
                id="petName"
                placeholder="Cupcake"
                required
              />
            </div>
            <div class="d-flex flex-column align-items-center my-2">
              <label for="ownerName" class="form-label text-white"
                >Nome padrone</label
              >
              <input
                type="text"
                class="d-block w-100 rounded-2 border border-1 border-white bg-secondary text-white"
                id="ownerName"
                placeholder="Giangiorgio"
                required
              />
            </div>
            <div class="d-flex flex-column align-items-center my-2">
              <label for="species" class="form-label text-white">Specie</label>
              <input
                type="text"
                class="d-block w-100 rounded-2 border border-1 border-white bg-secondary text-white"
                id="species"
                placeholder="42"
                required
              />
            </div>
            <div class="d-flex flex-column align-items-center my-2">
              <label for="breed" class="form-label text-white">Razza</label>
              <input
                type="text"
                class="d-block w-100 rounded-2 border border-1 border-white bg-secondary text-white"
                id="location"
                placeholder="Roma"
                required
              />
            </div>
            <div class="text-center mt-3">
              <button class="btn btn-success w-50" type="submit">
                INVIA PET
              </button>
            </div>
          </form>
          <article>
            <ul id="pet-list" class="list-group mt-5"></ul>
          </article>
        </article>
      </section>
    </main>
    <footer></footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./js.js"></script>
  </body>
</html>
